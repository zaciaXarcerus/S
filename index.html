<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatWave</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --sidebar: #111827;
    --panel: #1a2235;
    --input-bg: #1e2d45;
    --accent: #25d366;
    --accent2: #128c7e;
    --accent-glow: rgba(37,211,102,0.15);
    --text: #e8f0f2;
    --muted: #8899aa;
    --border: rgba(255,255,255,0.07);
    --bubble-out: #005c4b;
    --bubble-in: #1f2c34;
    --online: #25d366;
    --radius: 12px;
    --header-h: 62px;
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

  /* ─── ONBOARDING ─── */
  #onboarding {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .ob-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 24px; padding: 48px 40px; width: 380px; text-align: center;
    box-shadow: 0 0 80px rgba(37,211,102,0.08);
  }
  .ob-logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; font-size: 32px;
  }
  .ob-card h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 600; margin-bottom: 8px; }
  .ob-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
  .ob-input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-size: 16px; font-family: inherit;
    outline: none; margin-bottom: 16px; transition: border-color .2s;
  }
  .ob-input:focus { border-color: var(--accent); }
  .ob-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; color: #fff; font-size: 16px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity .2s;
  }
  .ob-btn:hover { opacity: .9; }
  .ob-note { font-size: 12px; color: var(--muted); margin-top: 16px; }

  /* ─── APP SHELL ─── */
  #app { display: none; height: 100vh; flex-direction: row; }
  #app.visible { display: flex; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: 340px; flex-shrink: 0; background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); height: var(--header-h); flex-shrink: 0;
  }
  .my-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 16px; cursor: pointer; position: relative;
  }
  .sidebar-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 20px; flex: 1; }
  .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .search-box {
    width: 100%; padding: 10px 14px; border-radius: 24px;
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-family: inherit; outline: none;
  }
  .search-box::placeholder { color: var(--muted); }
  #users-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  #users-list::-webkit-scrollbar { width: 4px; }
  #users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .user-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; cursor: pointer; transition: background .15s; position: relative;
  }
  .user-item:hover, .user-item.active { background: var(--panel); }
  .user-item.active { border-left: 3px solid var(--accent); }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 17px; position: relative;
  }
  .avatar-online::after {
    content: ''; position: absolute; bottom: 2px; right: 2px;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--online); border: 2px solid var(--sidebar);
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-preview { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .user-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .user-time { font-size: 11px; color: var(--muted); }
  .unread-badge {
    background: var(--accent); color: #000; border-radius: 50%;
    min-width: 18px; height: 18px; font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .empty-hint { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 20px; }

  /* ─── CHAT PANEL ─── */
  #chat-panel {
    flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    background: var(--bg);
  }
  .chat-header {
    display: flex; align-items: center; gap: 14px;
    padding: 0 20px; height: var(--header-h);
    background: var(--sidebar); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .chat-header .avatar { width: 40px; height: 40px; font-size: 15px; }
  .chat-peer-name { font-weight: 600; font-size: 16px; }
  .chat-peer-status { font-size: 12px; color: var(--accent); margin-top: 1px; }
  #chat-placeholder {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--muted); gap: 12px;
  }
  #chat-placeholder .ph-icon { font-size: 64px; opacity: .3; }
  #chat-placeholder p { font-size: 15px; }
  #messages-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 4px; }
  #messages-area::-webkit-scrollbar { width: 4px; }
  #messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-day-label {
    text-align: center; font-size: 12px; color: var(--muted);
    background: var(--panel); border-radius: 16px; padding: 4px 12px;
    align-self: center; margin: 8px 0;
  }
  .msg-row { display: flex; align-items: flex-end; gap: 6px; max-width: 72%; }
  .msg-row.out { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.in { align-self: flex-start; }
  .msg-avatar { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .bubble {
    padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5;
    position: relative; word-break: break-word;
  }
  .msg-row.out .bubble { background: var(--bubble-out); border-bottom-right-radius: 4px; }
  .msg-row.in .bubble { background: var(--bubble-in); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: nowrap; }
  .msg-row.out .msg-time { text-align: right; }
  .msg-row.in .msg-time { text-align: left; }

  /* typing indicator */
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
  .typing-indicator span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce .8s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ─── INPUT BAR ─── */
  .input-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--sidebar);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .msg-input {
    flex: 1; padding: 12px 16px; border-radius: 24px;
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-size: 15px; font-family: inherit;
    outline: none; resize: none; max-height: 120px;
    transition: border-color .2s;
  }
  .msg-input:focus { border-color: rgba(37,211,102,.4); }
  .msg-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity .2s, transform .1s;
  }
  .send-btn:hover { opacity: .9; }
  .send-btn:active { transform: scale(.95); }
  .send-btn svg { width: 20px; height: 20px; fill: #fff; }

  .no-chat { display: none; }
  #chat-main { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  #chat-main.visible { display: flex; }
</style>
</head>
<body>

<!-- ── ONBOARDING ── -->
<div id="onboarding">
  <div class="ob-card">
    <div class="ob-logo">💬</div>
    <h1>ChatWave</h1>
    <p>Pick your display name. You'll only need to do this once on this device.</p>
    <input class="ob-input" id="name-input" type="text" placeholder="Your name (e.g. Tyson)" maxlength="30" />
    <button class="ob-btn" onclick="register()">Start chatting →</button>
    <p class="ob-note">Your profile goes live instantly so others can find you.</p>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="my-avatar-el" title="You"></div>
      <span class="sidebar-title">ChatWave</span>
    </div>
    <div class="search-wrap">
      <input class="search-box" id="search-box" placeholder="🔍  Search users..." oninput="filterUsers(this.value)" />
    </div>
    <div id="users-list"><p class="empty-hint">Loading users…</p></div>
  </div>

  <!-- Chat -->
  <div id="chat-panel">
    <div id="chat-placeholder">
      <div class="ph-icon">💬</div>
      <p>Select a conversation to start chatting</p>
    </div>
    <div id="chat-main">
      <div class="chat-header">
        <div class="avatar" id="peer-avatar"></div>
        <div>
          <div class="chat-peer-name" id="peer-name"></div>
          <div class="chat-peer-status" id="peer-status">online</div>
        </div>
      </div>
      <div id="messages-area"></div>
      <div class="input-bar">
        <textarea class="msg-input" id="msg-input" rows="1" placeholder="Type a message…" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
//  STORAGE  (uses artifact persistent storage)
// ──────────────────────────────────────────────
const USERS_KEY  = 'chatwave:users';
const MSGS_KEY   = (a, b) => 'chatwave:msgs:' + [a,b].sort().join(':');
const ONLINE_KEY = u => 'chatwave:online:' + u;

async function dbGet(key) {
  try { const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
  catch { return null; }
}
async function dbSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
}

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let me = null;          // { name, color, initials, joinedAt }
let activePeer = null;  // name string
let allUsers   = {};    // { name: userData }
let allMsgs    = {};    // { msgKey: [msg,…] }
let pollTimer  = null;
let heartbeatTimer = null;

// ──────────────────────────────────────────────
//  COLOR PALETTE for avatars
// ──────────────────────────────────────────────
const COLORS = [
  ['#1a4a6e','#4fc3f7'],['#2e4a2e','#81c784'],['#5c2e2e','#ef9a9a'],
  ['#4a2e5c','#ce93d8'],['#4a3b2e','#ffb74d'],['#1a4a4a','#4dd0e1'],
  ['#4a4a1a','#fff176'],['#3b1a4a','#f48fb1'],
];
function userColor(name) {
  let h = 0; for (const c of name) h = (h*31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function avatarStyle(name, size=46) {
  const [bg, fg] = userColor(name);
  return `background:${bg};color:${fg};width:${size}px;height:${size}px;`;
}

// ──────────────────────────────────────────────
//  ONBOARDING
// ──────────────────────────────────────────────
async function register() {
  const raw = document.getElementById('name-input').value.trim();
  if (!raw) return shake();
  const name = raw.slice(0,30);
  me = { name, joinedAt: Date.now() };
  localStorage.setItem('chatwave_me', JSON.stringify(me));
  await saveUser();
  bootApp();
}

function shake() {
  const el = document.getElementById('name-input');
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'shake .4s ease';
}

async function saveUser() {
  const users = (await dbGet(USERS_KEY)) || {};
  users[me.name] = { name: me.name, joinedAt: me.joinedAt, lastSeen: Date.now() };
  await dbSet(USERS_KEY, users);
}

// ──────────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('chatwave_me');
  if (saved) {
    me = JSON.parse(saved);
    await saveUser();
    bootApp();
  }
});

function bootApp() {
  document.getElementById('onboarding').style.display = 'none';
  const app = document.getElementById('app');
  app.classList.add('visible');

  // set my avatar
  const el = document.getElementById('my-avatar-el');
  el.style.cssText += avatarStyle(me.name, 40);
  el.textContent = initials(me.name);
  el.title = me.name + ' (you)';

  startPolling();
  startHeartbeat();
}

// ──────────────────────────────────────────────
//  HEARTBEAT – keep "online" status
// ──────────────────────────────────────────────
async function startHeartbeat() {
  const beat = async () => {
    const users = (await dbGet(USERS_KEY)) || {};
    if (users[me.name]) { users[me.name].lastSeen = Date.now(); await dbSet(USERS_KEY, users); }
  };
  beat();
  heartbeatTimer = setInterval(beat, 8000);
}

function isOnline(user) {
  return user && user.lastSeen && (Date.now() - user.lastSeen) < 20000;
}

// ──────────────────────────────────────────────
//  POLLING – refresh users + messages
// ──────────────────────────────────────────────
async function startPolling() {
  await refresh();
  pollTimer = setInterval(refresh, 3000);
}

async function refresh() {
  // users
  const users = (await dbGet(USERS_KEY)) || {};
  allUsers = users;
  renderUserList();

  // messages for active chat
  if (activePeer) {
    const key  = MSGS_KEY(me.name, activePeer);
    const msgs = (await dbGet(key)) || [];
    renderMessages(msgs);
    // update peer status
    const peer = users[activePeer];
    document.getElementById('peer-status').textContent = isOnline(peer) ? 'online' : 'last seen ' + relTime(peer?.lastSeen);
    document.getElementById('peer-status').style.color = isOnline(peer) ? 'var(--accent)' : 'var(--muted)';
  }
}

// ──────────────────────────────────────────────
//  RENDER USER LIST
// ──────────────────────────────────────────────
let searchQuery = '';
function filterUsers(q) { searchQuery = q.toLowerCase(); renderUserList(); }

async function renderUserList() {
  const list = document.getElementById('users-list');
  const entries = Object.values(allUsers).filter(u => u.name !== me.name);

  if (!entries.length) {
    list.innerHTML = '<p class="empty-hint">No other users yet.<br>Share this app so friends can join!</p>';
    return;
  }

  // For each user, get last message preview
  const previews = await Promise.all(entries.map(async u => {
    const key = MSGS_KEY(me.name, u.name);
    const msgs = (await dbGet(key)) || [];
    const last = msgs[msgs.length - 1];
    return { user: u, last };
  }));

  // sort by last message time, then join time
  previews.sort((a,b) => {
    const ta = a.last?.ts || a.user.joinedAt;
    const tb = b.last?.ts || b.user.joinedAt;
    return tb - ta;
  });

  const filtered = searchQuery
    ? previews.filter(p => p.user.name.toLowerCase().includes(searchQuery))
    : previews;

  list.innerHTML = filtered.map(({ user, last }) => {
    const online = isOnline(user);
    const active = activePeer === user.name ? 'active' : '';
    const av = `style="${avatarStyle(user.name, 46)}" `;
    const cls = online ? 'avatar avatar-online' : 'avatar';
    const preview = last ? (last.from === me.name ? 'You: ' + last.text : last.text) : 'Say hello!';
    const time = last ? relTime(last.ts) : '';
    return `<div class="user-item ${active}" onclick="openChat('${esc(user.name)}')">
      <div class="${cls}" ${av}>${initials(user.name)}</div>
      <div class="user-info">
        <div class="user-name">${esc(user.name)}</div>
        <div class="user-preview">${esc(preview)}</div>
      </div>
      <div class="user-meta">
        <span class="user-time">${time}</span>
      </div>
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────────
//  OPEN CHAT
// ──────────────────────────────────────────────
async function openChat(peerName) {
  activePeer = peerName;
  document.getElementById('chat-placeholder').style.display = 'none';
  document.getElementById('chat-main').classList.add('visible');

  const peer = allUsers[peerName] || { name: peerName };
  const peerAv = document.getElementById('peer-avatar');
  peerAv.style.cssText = avatarStyle(peerName, 40);
  peerAv.textContent = initials(peerName);
  document.getElementById('peer-name').textContent = peerName;

  renderUserList();

  const key  = MSGS_KEY(me.name, peerName);
  const msgs = (await dbGet(key)) || [];
  renderMessages(msgs);

  document.getElementById('msg-input').focus();
  scrollBottom();
}

// ──────────────────────────────────────────────
//  RENDER MESSAGES
// ──────────────────────────────────────────────
function renderMessages(msgs) {
  const area = document.getElementById('messages-area');
  if (!msgs.length) {
    area.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:13px;margin-top:40px">No messages yet. Say hi! 👋</p>';
    return;
  }
  let html = '';
  let lastDay = '';
  msgs.forEach(m => {
    const day = new Date(m.ts).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    if (day !== lastDay) { html += `<div class="msg-day-label">${day}</div>`; lastDay = day; }
    const out = m.from === me.name;
    const cls = out ? 'out' : 'in';
    const av  = out ? '' : `<div class="msg-avatar" style="${avatarStyle(m.from,26)}">${initials(m.from)}</div>`;
    html += `<div class="msg-row ${cls}">
      ${av}
      <div>
        <div class="bubble">${esc(m.text)}</div>
        <div class="msg-time">${new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>`;
  });
  area.innerHTML = html;
  scrollBottom();
}

// ──────────────────────────────────────────────
//  SEND MESSAGE
// ──────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !activePeer) return;
  inp.value = '';
  inp.style.height = '';

  const msg = { from: me.name, to: activePeer, text, ts: Date.now() };
  const key  = MSGS_KEY(me.name, activePeer);
  const msgs = (await dbGet(key)) || [];
  msgs.push(msg);
  await dbSet(key, msgs);
  renderMessages(msgs);
  renderUserList();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  // auto-grow textarea
  const t = e.target;
  setTimeout(() => { t.style.height = ''; t.style.height = Math.min(t.scrollHeight, 120) + 'px'; }, 0);
}

// ──────────────────────────────────────────────
//  UTILS
// ──────────────────────────────────────────────
function scrollBottom() {
  const a = document.getElementById('messages-area');
  if (a) setTimeout(() => { a.scrollTop = a.scrollHeight; }, 50);
}

function relTime(ts) {
  if (!ts) return '';
  const d = Date.now() - ts;
  if (d < 60000) return 'now';
  if (d < 3600000) return Math.floor(d/60000) + 'm';
  if (d < 86400000) return Math.floor(d/3600000) + 'h';
  return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'});
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
